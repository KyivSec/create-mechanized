plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    srcDir('src/generated/resources')
    exclude("**/*.bbmodel")
    exclude("src/generated/**/.cache")
}

repositories {
    maven {
        name = "Ryanhcode Releases"
        url = "https://maven.ryanhcode.dev/releases"
        content {
            // Sable and its sable-companion submodule live here.
            includeGroup "dev.ryanhcode.sable"
            includeGroup "dev.ryanhcode.sable-companion"
        }
    }
    maven {
        // Veil (rendering / networking library; transitive dependency of Sable).
        // Also hosts molang-compiler and glsl-processor which Veil pulls in.
        name = "BlameJared"
        url = "https://maven.blamejared.com"
        content {
            includeGroup "foundry.veil"
            includeGroup "gg.moonflower"
            includeGroup "io.github.ocelot"
            includeGroup "mezz.jei"
        }
    }
    maven {
        // Create mod ecosystem maven — hosts Flywheel, Create itself, and Ponder.
        // All three are pulled in transitively by Sable.
        name = "Create Mod"
        url = "https://maven.createmod.net"
        content {
            includeGroup "dev.engine-room.flywheel"
            includeGroup "com.simibubi.create"
            includeGroup "net.createmod.ponder"
        }
    }
    maven {
        // Registrate — hosted on iThundxr's snapshot maven for the MC1.21 line.
        name = "iThundxr"
        url = "https://maven.ithundxr.dev/snapshots"
        content {
            includeGroup "com.tterrag.registrate"
        }
    }
}

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    implementation "dev.ryanhcode.sable:sable-neoforge-1.21.1:${sable_version}"

    // JEI — compile-time only (the `@JeiPlugin` class isn't loaded when JEI is absent at runtime).
    compileOnly "mezz.jei:jei-1.21.1-common-api:${jei_version}"
    compileOnly "mezz.jei:jei-1.21.1-neoforge-api:${jei_version}"
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            sable_version_range    : sable_version_range,
            jei_version_range      : jei_version_range,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
